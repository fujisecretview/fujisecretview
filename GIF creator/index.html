<!doctype html>
<html lang="en">
  <!-- 

    Particles thanks to ParticleJS - https://github.com/VincentGarreau/particles.js/
    Typewriter thanks to Typewriter.js - https://github.com/tameemsafi/typewriterjs

 -->

  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <style>
      body {
        padding: 0;
        margin: 0;
        background-color: #0d1116;
      }

      /* This GIF was created using SF Pro. Because the font can’t be included in this repository, please install it locally if you want identical rendering. */
      @font-face {
        font-family: "SF Pro";
        src: url("./fonts/SF-Pro-Display-Regular.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
      }

      #particles-js {
        width: 800px;
        height: 387px;

        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 1px solid rgb(246, 198, 38);
        opacity: 0.9;
      }

      #typewriter {
        position: absolute;
        padding-bottom: 3px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -60px);
        font-size: 3rem;
        line-height: 3rem;
        color: #fff;
        text-align: center;
        font-family: "SF-Pro-Display-Regular", sans-serif;
        font-weight: 500;
        clip: auto;
        z-index: 1;
        background: white;
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      #typewriter2 {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, 20px);
        font-size: 2rem;
        line-height: 3rem;
        color: #fff;
        text-align: center;
        font-family: "SF-Pro-Display-Regular", sans-serif;
        font-weight: 500;
        z-index: 1;
        background: white;
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      #welcome-text {
        position: absolute;
        top: 42%;
        left: 50%;
        transform: translate(-50%, 20px);
        font-size: 3.5rem;
        line-height: 5rem;
        color: #fff;
        text-align: center;
        font-family: "SF-Pro-Display-Regular", sans-serif;
        font-weight: 400;
        z-index: 1;
        background: white;
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>

  <!-- particles.js container -->
  <div id="particles-js"></div>
  <!-- stats - count particles -->
  <div class="count-particles">
    <span class="js-count-particles">--</span> particles
  </div>
  <!-- particles.js lib - https://github.com/VincentGarreau/particles.js -->
  <script src="http://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <!-- stats.js lib -->
  <script src="http://threejs.org/examples/js/libs/stats.min.js"></script>

  <body>
    <div id="welcome-text"></div>
    <div id="typewriter"></div>
    <div id="typewriter2"></div>
    <div id="particles-js"></div>
    <script src="particles.js"></script>
    <script>
      particlesJS.load("particles-js", "particles.css", function () {
        console.log("callback - particles-js config loaded");
      });

      setTimeout(() => {
        const initWelcomeText = (text) => {
          new Typewriter("#welcome-text", { delay: 30 })
            .typeString("Enjoy your stay")
            .start();
        };

        new Typewriter("#typewriter", {
          delay: 30,
        })
          .typeString("Hello world, I'm Oleg")
          .pauseFor(1900)
          .deleteAll(20)
          .typeString("I build things for the web")
          .pauseFor(2600)
          .deleteAll(17)
          .typeString("And run my own infrastructure")
          .pauseFor(2400)
          .deleteAll(18)
          .callFunction(() => {
            initWelcomeText();
          })
          .start();

        new Typewriter("#typewriter2", {
          delay: 30,
        })
          .pauseFor(700)
          .typeString("Nice to meet you.")
          .pauseFor(900)
          .deleteAll(20)
          .pauseFor(1400)
          .typeString("TypeScript, React, Next.js, Node.js")
          .pauseFor(600)
          .deleteAll(17)
          .pauseFor(1600)
          .typeString("Docker, Nginx, Linux, VPN")
          .pauseFor(1000)
          .deleteAll(17)
          .start();
      }, 1500);
    </script>
    <script></script>
  </body>
</html>
